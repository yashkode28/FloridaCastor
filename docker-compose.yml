services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather_pw
      POSTGRES_DB: weather_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather -d weather_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "5001:5000"
    environment:
      DATABASE_URL: postgresql+psycopg2://weather:weather_pw@db:5432/weather_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
